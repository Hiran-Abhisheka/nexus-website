name: CI/CD - Build & Test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      # Checkout the code
      - name: Checkout code
        uses: actions/checkout@v4

      # Setup Node.js
      - name: Setup Node.js 20.9.0
        uses: actions/setup-node@v4
        with:
          node-version: 20.9.0
          cache: "npm"

      # Install dependencies
      - name: Install dependencies
        run: npm install

      # Run linting (non-blocking)
      - name: Run ESLint
        run: npm run lint
        continue-on-error: true

      # Build the project
      - name: Build Next.js project
        run: npm run build

      # Test success
      - name: Build Success
        if: success()
        run: echo "✅ Build completed successfully! Netlify will auto-deploy from this commit."

      # Failure notification
      - name: Build Failed
        if: failure()
        run: echo "❌ Build failed! Fix errors before pushing."
