name: CI/CD - Build & Deploy to Netlify

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      # Checkout the code
      - name: Checkout code
        uses: actions/checkout@v4

      # Setup Node.js
      - name: Setup Node.js 18.x
        uses: actions/setup-node@v4
        with:
          node-version: 18.x
          cache: 'npm'

      # Install dependencies
      - name: Install dependencies
        run: npm install

      # Run linting (non-blocking)
      - name: Run ESLint
        run: npm run lint
        continue-on-error: true

      # Build the project
      - name: Build Next.js project
        run: npm run build

      # Deploy to Netlify using CLI
      - name: Deploy to Netlify
        run: |
          npm install -g netlify-cli
          netlify deploy --prod --dir=.
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}

      # Post deployment notification (optional)
      - name: Deployment Success
        if: success()
        run: echo "✅ Deployment to Netlify completed successfully!"

      # Failure notification
      - name: Deployment Failed
        if: failure()
        run: echo "❌ Deployment failed! Check build logs above."
