name: CI/CD - Build & Deploy to Vercel

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      # Checkout the code
      - name: Checkout code
        uses: actions/checkout@v4

      # Setup Node.js
      - name: Setup Node.js 20.9.0
        uses: actions/setup-node@v4
        with:
          node-version: 20.9.0
          cache: "npm"

      # Install dependencies
      - name: Install dependencies
        run: npm install

      # Run linting (non-blocking)
      - name: Run ESLint
        run: npm run lint
        continue-on-error: true

      # Build the project
      - name: Build Next.js project
        run: npm run build

      # Deploy to Vercel (production on main, preview on PR)
      - name: Deploy to Vercel
        uses: vercel/action@master
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          production: ${{ github.ref == 'refs/heads/main' }}
        env:
          VERCEL_ENV: ${{ github.ref == 'refs/heads/main' && 'production' || 'preview' }}

      # Deployment success notification
      - name: Deployment Success
        if: success()
        run: echo "✅ Deployment to Vercel completed successfully!"

      # Deployment failure notification
      - name: Deployment Failed
        if: failure()
        run: echo "❌ Deployment failed! Check build logs above."
