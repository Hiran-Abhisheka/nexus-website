name: CI/CD - Build & Deploy to Vercel

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      # Checkout the code
      - name: Checkout code
        uses: actions/checkout@v4

      # Setup Node.js
      - name: Setup Node.js 20.9.0
        uses: actions/setup-node@v4
        with:
          node-version: 20.9.0
          cache: "npm"

      # Install dependencies
      - name: Install dependencies
        run: npm install

      # Run linting (non-blocking)
      - name: Run ESLint
        run: npm run lint || echo "Linting warnings/errors found but continuing..."
        continue-on-error: true

      # Build the project
      - name: Build Next.js project
        run: npm run build

      # Deploy to Vercel (production on main, preview on PR)
      - name: Deploy to Vercel
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          npm install -g vercel
          vercel link --yes --token=${{ secrets.VERCEL_TOKEN }}
          vercel deploy --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      # Deployment success notification
      - name: Deployment Success
        if: success()
        run: echo "✅ Deployment to Vercel completed successfully!"

      # Deployment failure notification
      - name: Deployment Failed
        if: failure()
        run: echo "❌ Deployment failed! Check build logs above."
