# Netlify Configuration for Next.js
[build]
command = "npm run build"
publish = ".next/static"

[build.environment]
NODE_VERSION = "20.9.0"

# Create a default redirect for Next.js
[[redirects]]
from = "/*"
to = "/index.html"
status = 200

# Cache headers for Next.js static assets
[[headers]]
for = "_next/static/*"
[headers.values]
Cache-Control = "public, max-age=31536000, immutable"
